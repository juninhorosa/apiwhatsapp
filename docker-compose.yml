services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./sessions:/sessions
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    restart: always
    depends_on:
      - app

# Serviço do MongoDB Local REMOVIDO para economizar RAM da VPS (Usando MongoDB Atlas na Nuvem)
